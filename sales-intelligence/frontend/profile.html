<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Sales Intelligence</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <span>📊</span> Sales Intelligence
    </a>
    <ul class="nav-links">
      <li id="nav-upload"><a href="upload.html">Upload</a></li>
      <li id="nav-history"><a href="history.html">History</a></li>
      <li id="nav-profile"><a href="profile.html" style="color:var(--rust);">Profile</a></li>
      <li id="nav-logout">
        <a href="#" onclick="handleLogout(); return false;">Logout</a>
      </li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <div class="container profile-page">

      <!-- Profile header with avatar -->
      <div class="profile-header">
        <div class="avatar" id="avatar">?</div>
        <div class="profile-info">
          <h1 id="profile-name">Loading...</h1>
          <p id="profile-shop" style="color:var(--muted);"></p>
        </div>
      </div>

      <!-- Alert box -->
      <div class="alert" id="profile-alert"></div>

      <!-- Profile fields grid -->
      <div class="card" style="margin-bottom:1.5rem;">
        <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1.2rem;color:var(--steel);">
          Account Details
        </h3>
        <div class="profile-grid">
          <div class="profile-field">
            <div class="field-label">Full Name</div>
            <div class="field-value" id="profile-name-field">—</div>
          </div>
          <div class="profile-field">
            <div class="field-label">Phone Number</div>
            <div class="field-value" id="profile-phone">—</div>
          </div>
          <div class="profile-field">
            <div class="field-label">Email Address</div>
            <div class="field-value" id="profile-email">—</div>
          </div>
          <div class="profile-field">
            <div class="field-label">Shop Name</div>
            <div class="field-value" id="profile-shop-field">—</div>
          </div>
          <div class="profile-field" style="grid-column: 1 / -1;">
            <div class="field-label">Location</div>
            <div class="field-value" id="profile-location">—</div>
          </div>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="profile-actions">
        <a href="upload.html"  class="btn btn-primary">📊 Upload Sales Data</a>
        <a href="history.html" class="btn btn-secondary">📋 View Upload History</a>
        <button class="btn btn-outline" onclick="handleLogout()">Logout</button>
      </div>

    </div>
  </div>

  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Redirect to login if not logged in
      const user = requireLogin();
      if (!user) return;

      // Fill profile from session storage immediately (fast)
      document.getElementById("avatar").textContent        = (user.name || "U").charAt(0).toUpperCase();
      document.getElementById("profile-name").textContent  = user.name || "—";
      document.getElementById("profile-shop").textContent  = user.shop_name || "";
      document.getElementById("profile-name-field").textContent  = user.name       || "—";
      document.getElementById("profile-phone").textContent       = user.phone      || "—";
      document.getElementById("profile-email").textContent       = user.email      || "—";
      document.getElementById("profile-shop-field").textContent  = user.shop_name  || "—";
      document.getElementById("profile-location").textContent    = user.location   || "—";

      // Also try to sync with backend for fresh data
      loadProfile();
    });

    // Override loadProfile display to match our field IDs
    async function loadProfile() {
      try {
        const resp = await fetch(`${API_BASE}/profile`, { credentials: "include" });
        const data = await resp.json();
        if (data.success) {
          const u = data.user;
          document.getElementById("avatar").textContent             = (u.name || "U").charAt(0).toUpperCase();
          document.getElementById("profile-name").textContent       = u.name      || "—";
          document.getElementById("profile-shop").textContent       = u.shop_name || "";
          document.getElementById("profile-name-field").textContent = u.name      || "—";
          document.getElementById("profile-phone").textContent      = u.phone     || "—";
          document.getElementById("profile-email").textContent      = u.email     || "—";
          document.getElementById("profile-shop-field").textContent = u.shop_name || "—";
          document.getElementById("profile-location").textContent   = u.location  || "—";
          saveUserSession(u);
        }
      } catch (e) {
        // Already showing session data — no problem
      }
    }
  </script>

</body>
</html>
